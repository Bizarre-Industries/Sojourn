name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swift-test:
    name: swift test
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.0.app

      - name: Swift version
        run: swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build
        run: swift build -c debug

      - name: Test
        run: swift test --parallel

  xcodebuild:
    name: xcodebuild test
    runs-on: macos-14
    if: hashFiles('Sojourn.xcodeproj/**') != ''
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.0.app

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -project Sojourn.xcodeproj -scheme Sojourn

      - name: Test
        run: |
          xcodebuild test \
            -project Sojourn.xcodeproj \
            -scheme Sojourn \
            -destination 'platform=macOS' \
            -enableCodeCoverage YES \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

  gitleaks:
    name: gitleaks scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config-path: .gitleaks.toml

  lint:
    name: SwiftLint (advisory)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install swiftlint
        run: brew install swiftlint
      - name: Lint
        run: swiftlint lint --strict --reporter github-actions-logging || true

  format-check:
    name: swift-format (advisory)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Install swift-format
        run: brew install swift-format
      - name: Check
        run: |
          swift-format lint --recursive Sojourn SojournTests SojournUITests \
            --parallel --configuration .swift-format || true
