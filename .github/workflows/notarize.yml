name: Notarize & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-sign-notarize:
    name: Build, sign, notarize
    runs-on: macos-14
    environment: release
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.0.app

      - name: Import Developer ID certificate
        env:
          DEVELOPER_ID_P12_BASE64: ${{ secrets.DEVELOPER_ID_P12_BASE64 }}
          DEVELOPER_ID_P12_PASSWORD: ${{ secrets.DEVELOPER_ID_P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          echo "$DEVELOPER_ID_P12_BASE64" | base64 --decode -o /tmp/dev-id.p12
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security import /tmp/dev-id.p12 -P "$DEVELOPER_ID_P12_PASSWORD" -A -t cert -f pkcs12 -k build.keychain
          security list-keychains -d user -s build.keychain $(security list-keychains -d user | sed 's/\"//g')
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain
          rm /tmp/dev-id.p12

      - name: Download bundled binaries (gitleaks, age)
        run: bash scripts/download-bundled-bins.sh

      - name: Re-sign bundled binaries
        env:
          DEVELOPER_ID_IDENTITY: ${{ secrets.DEVELOPER_ID_IDENTITY }}
        run: bash scripts/sign.sh

      - name: Build Sojourn.app
        run: |
          xcodebuild -project Sojourn.xcodeproj \
            -scheme Sojourn \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="$DEVELOPER_ID_IDENTITY" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$DEVELOPMENT_TEAM" \
            OTHER_CODE_SIGN_FLAGS="--timestamp --options=runtime" \
            clean build
        env:
          DEVELOPER_ID_IDENTITY: ${{ secrets.DEVELOPER_ID_IDENTITY }}
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}

      - name: Create DMG
        run: bash scripts/make-dmg.sh build/Build/Products/Release/Sojourn.app

      - name: Notarize DMG
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          DEVELOPMENT_TEAM: ${{ secrets.DEVELOPMENT_TEAM }}
        run: bash scripts/notarize.sh Sojourn.dmg

      - name: Verify Gatekeeper acceptance
        run: |
          spctl --assess --type execute --verbose=4 build/Build/Products/Release/Sojourn.app
          spctl --assess --type install --verbose=4 Sojourn.dmg

      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        with:
          files: Sojourn.dmg
          generate_release_notes: true

      - name: Publish Homebrew cask update
        if: "!contains(github.ref, '-')"
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: bash scripts/publish-homebrew-cask.sh "${GITHUB_REF_NAME}"
