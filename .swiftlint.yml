# Sojourn — swiftlint config (advisory; ci.yml runs with -- || true).
# See Makefile:lint and docs/IMPLEMENTATION_PLAN.md Phase 9.

included:
  - Sojourn
  - SojournTests
  - SojournUITests

excluded:
  - .build
  - build
  - DerivedData
  - Sojourn.xcodeproj
  - Sojourn/Resources

disabled_rules:
  - trailing_whitespace
  - line_length       # enforced by swift-format
  - identifier_name   # allow 1-char args; Swift idiomatic
  - todo              # CLAUDE.md bans TODOs but swiftlint's rule is noisy

opt_in_rules:
  - empty_count
  - explicit_init
  - first_where
  - force_unwrapping
  - implicit_return
  - closure_end_indentation
  - closure_spacing
  - contains_over_first_not_nil
  - literal_expression_end_indentation
  - operator_usage_whitespace
  - pattern_matching_keywords
  - redundant_nil_coalescing
  - sorted_imports
  - vertical_whitespace_closing_braces
  - vertical_whitespace_opening_braces

force_unwrapping:
  severity: warning

cyclomatic_complexity:
  warning: 15
  error: 25

function_body_length:
  warning: 80
  error: 150

type_body_length:
  warning: 400
  error: 600

file_length:
  warning: 500
  error: 900
  ignore_comment_only_lines: true

nesting:
  type_level: 3
  function_level: 3
