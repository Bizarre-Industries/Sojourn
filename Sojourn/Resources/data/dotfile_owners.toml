[[owner]]
path = ".docker"
owner = "third-party"

[[owner]]
path = ".kube"
owner = "user"

[[owner]]
path = ".aws"
owner = "user"

[[owner]]
path = ".chezmoi.toml"
owner = "chezmoi"

[[owner]]
path = ".local/share/chezmoi"
owner = "chezmoi"
notes = "chezmoi source state; owned by chezmoi itself"

[[owner]]
path = ".hushlogin"
owner = "user"

[[owner]]
path = ".viminfo"
owner = "user"

[[owner]]
path = ".vim"
owner = "user"

[[owner]]
