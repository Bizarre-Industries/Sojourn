# Default gitleaks rules shipped with Sojourn.
# Applied to the user data repo when Sojourn runs pre-commit secret scans.
# See docs/ARCHITECTURE.md section 5.3 and section 10.

title = "Sojourn default secret-scan rules"

[extend]
useDefault = true

[allowlist]
description = "Safe example patterns documented in setup guides."
regexes = [
  '\''age1[a-z0-9]{10,}'\'',
  '\''AKIAIOSFODNN7EXAMPLE'\'',
  '\''wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY'\'',
]
